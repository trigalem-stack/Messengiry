<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Global Link Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --accent-hover: #2563eb;
            --me: #3b82f6; --them: #334155; --text-main: #f8fafc; --text-muted: #94a3b8;
            --danger: #ef4444; --danger-hover: #dc2626; --success: #10b981;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text-main); margin: 0; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; user-select: none; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }

        input {
            user-select: auto; width: 100%; padding: 16px; border-radius: 16px; 
            border: 2px solid transparent; background: #0f172a; color: white; 
            margin-bottom: 16px; font-size: 16px; outline: none; transition: all 0.3s ease;
        }
        input:focus { border: 2px solid var(--accent); background: #1e293b; }

        button { 
            padding: 16px; border-radius: 16px; border: none; background: var(--accent); 
            color: white; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.2s ease; 
        }
        button:active { transform: scale(0.96); }
        button:hover { background: var(--accent-hover); }

        #notification-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 9999; display: flex; align-items: center; gap: 15px; transition: top 0.4s ease;
            border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px;
        }

        #incoming-call-banner {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--card); padding: 20px; border-radius: 20px;
            z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid var(--success); width: 90%; max-width: 350px; text-align: center;
        }

        #online-banner { background: var(--success); color: white; font-size: 12px; font-weight: bold; text-align: center; padding: 4px; z-index: 1001; }
        
        #btn-fullscreen {
            position: fixed; top: 35px; left: 50%; transform: translateX(-50%); 
            width: 44px; height: 44px; padding: 0; border-radius: 50%; background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); font-size: 18px; 
            display: flex; align-items: center; justify-content: center; z-index: 9998;
        }

        #auth { position: fixed; inset: 0; background: radial-gradient(circle, #1e293b, #0f172a); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .auth-card { background: rgba(30, 41, 59, 0.8); padding: 40px 30px; border-radius: 32px; width: 100%; max-width: 380px; text-align: center; }
        .btn-secondary { background: #334155; }
        
        #app { display: flex; flex-direction: column; height: 100vh; width: 100%; }
        header { background: rgba(30, 41, 59, 0.85); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; padding-top: calc(15px + env(safe-area-inset-top)); }
        
        .tab-content { flex: 1; overflow-y: auto; padding: 25px 20px; }
        .list-item { background: var(--card); padding: 16px 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        #requests-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1500; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 400px; border-radius: 24px; padding: 20px; max-height: 80vh; overflow-y: auto; }

        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }
        
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 78%; font-size: 15px; word-wrap: break-word; position: relative; cursor: pointer; transition: opacity 0.2s; }
        .msg:active { opacity: 0.7; }
        .me { background: var(--me); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .them { background: var(--them); align-self: flex-start; border-bottom-left-radius: 4px; color: var(--text-main); }
        .system-msg { background: transparent; align-self: center; color: var(--text-muted); font-size: 12px; border: 1px solid #334155; max-width: 90%; text-align: center;}
        
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 5px; text-align: right; display: flex; justify-content: flex-end; gap: 4px; align-items: center; }
        
        .chat-footer { background: rgba(30, 41, 59, 0.85); padding: 10px 15px; display: flex; gap: 8px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); position: fixed; bottom: 0; width: 100%; align-items: center; }
        
        .hidden { display: none !important; }
        .badge { background: var(--danger); padding: 4px 8px; border-radius: 12px; font-size: 12px; color: white; }
        
        audio { height: 36px; max-width: 200px; outline: none; }
        .recording { animation: pulse 1s infinite; background: var(--danger) !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Контекстное меню для удаления */
        #msg-options {
            position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--card);
            border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 20px;
            z-index: 2000; transition: bottom 0.3s ease; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 10px;
        }
        #msg-options.active { bottom: 0; }

        /* Видео контейнер */
        #video-container {
            position: fixed; inset: 0; background: #000; z-index: 1050; display: flex; flex-direction: column;
        }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo {
            position: absolute; bottom: 100px; right: 20px; width: 100px; height: 150px;
            object-fit: cover; border-radius: 12px; border: 2px solid var(--accent); background: #222;
        }
        .video-controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 1060;
        }
    </style>
</head>
<body>

    <div id="online-banner">Загрузка онлайна...</div>
    <button id="btn-fullscreen" onclick="toggleFullScreen()">🔲</button>

    <div id="notification-toast">
        <div style="font-size: 24px;">💬</div>
        <div>
            <strong id="notif-title" style="display: block; font-size: 16px;">Имя</strong>
            <span id="notif-text" style="font-size: 14px; color: var(--text-muted);">Сообщение...</span>
        </div>
    </div>

    <div id="incoming-call-banner" class="hidden">
        <div id="incoming-icon" style="font-size: 30px; margin-bottom: 10px;">📞</div>
        <div style="color: var(--text-muted); font-size: 14px;" id="incoming-type-text">Входящий звонок</div>
        <strong id="caller-name" style="display: block; font-size: 22px; margin: 10px 0 20px;">Имя</strong>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="rejectIncomingCall()" style="background: var(--danger); flex: 1; padding: 12px;">Сбросить</button>
            <button onclick="acceptIncomingCall()" style="background: var(--success); flex: 1; padding: 12px;">Ответить</button>
        </div>
    </div>

    <div id="msg-options">
        <h3 style="margin: 0 0 10px 0; text-align: center; font-size: 16px;">Действия с сообщением</h3>
        <button id="btn-del-everyone" onclick="deleteMsgForEveryone()" style="background: var(--danger);">Удалить у всех</button>
        <button onclick="deleteMsgForMe()" style="background: #eab308; color: #000;">Удалить у меня</button>
        <button onclick="closeMsgOptions()" style="background: var(--them);">Отмена</button>
    </div>

    <div id="video-container" class="hidden">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <div class="video-controls">
            <button onclick="endCall(true)" style="background: var(--danger); border-radius: 50%; width: 60px; height: 60px; font-size: 24px;">☎</button>
        </div>
    </div>

    <div id="auth" class="fade-in">
        <div class="auth-card">
            <h2 style="color: var(--accent); margin-bottom: 8px;">Global Link</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Войдите, чтобы продолжить</p>
            <input type="text" id="username" placeholder="Логин">
            <input type="password" id="password" placeholder="Пароль">
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button onclick="login()">Войти</button>
                <button class="btn-secondary" onclick="register()">Создать аккаунт</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center;">👤</div>
                <strong id="my-name-display" style="font-size: 18px;"></strong>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button style="padding: 10px 15px; background: #334155;" onclick="openRequestsModal()">
                    Запросы <span id="req-count" class="badge hidden">0</span>
                </button>
                <button style="padding: 10px 15px; background: var(--danger);" onclick="logout()">Выйти</button>
            </div>
        </header>

        <div class="tab-content fade-in">
            <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
                <input type="text" id="search-name" placeholder="Имя друга..." style="margin: 0;">
                <button onclick="sendFriendRequest()" style="padding: 16px 20px;">Найти</button>
            </div>
            <h4 style="color: var(--text-muted); font-size: 13px; text-transform: uppercase;">Мои друзья</h4>
            <div id="friends-list"></div>
        </div>
    </div>

    <div id="requests-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Запросы в друзья</h3>
                <button style="padding: 5px 10px; background: var(--danger);" onclick="closeRequestsModal()">X</button>
            </div>
            <div id="request-list">Нет новых запросов</div>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button style="background: transparent; padding: 0; font-size: 24px;" onclick="closeChat()">⬅</button>
                <div>
                    <strong id="chat-with-name" style="font-size: 18px;">Чат</strong>
                    <span id="call-status" style="font-size: 12px; color: var(--success); display: none;">Идет вызов...</span>
                </div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="btn-end-call" onclick="endCall(true)" class="hidden" style="background: var(--danger); border-radius: 50%; width: 40px; height: 40px; padding: 0;">☎</button>
                <button id="btn-make-call-audio" onclick="makeCall(false)" style="background: var(--success); border-radius: 50%; width: 40px; height: 40px; padding: 0;">📞</button>
                <button id="btn-make-call-video" onclick="makeCall(true)" style="background: var(--accent); border-radius: 50%; width: 40px; height: 40px; padding: 0;">📹</button>
            </div>
        </header>
        <div id="messages"></div>
        <div class="chat-footer">
            <input type="text" id="msg-input" placeholder="Сообщение..." style="margin:0; border-radius: 24px;">
            <button id="btn-voice" onclick="toggleVoiceRecord()" style="border-radius: 50%; width: 45px; height: 45px; padding: 0; background: #334155;">🎤</button>
            <button onclick="sendMsg()" style="border-radius: 50%; width: 45px; height: 45px; padding: 0;">✈</button>
        </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA4_8EQUvwXEO3Qt8BpraJl-WRnNk_EasE",
        authDomain: "hsnenen-aa0c3.firebaseapp.com",
        databaseURL: "https://hsnenen-aa0c3-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hsnenen-aa0c3",
        storageBucket: "hsnenen-aa0c3.firebasestorage.app",
        messagingSenderId: "457148631170",
        appId: "1:457148631170:web:e157381f66de9915508c9b"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let myName = "";
    let activeChat = "";
    let pendingCallData = null; 
    let pc, localStream;
    let isVideoCallActive = false;
    let selectedMsgId = null;
    let deletedForMe = JSON.parse(localStorage.getItem('deletedMessages') || "[]");
    
    const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
    
    function toggleFullScreen() {
        const btn = document.getElementById('btn-fullscreen');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(()=>{});
            btn.innerText = "✖";
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            btn.innerText = "🔲";
        }
    }

    // Получение времени строго по МСК
    function getMskTimeStr(timestamp) {
        return new Date(timestamp).toLocaleTimeString('ru-RU', {
            timeZone: 'Europe/Moscow', hour: '2-digit', minute:'2-digit'
        });
    }

    window.onload = () => {
        const savedUser = localStorage.getItem('globalLinkUser');
        if (savedUser) startApp(savedUser);
    };

    function logout() {
        endCall(true);
        db.ref(`online/${myName}`).remove();
        localStorage.removeItem('globalLinkUser');
        location.reload();
    }

    async function login() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();
        if (user.length < 2) return showNotification("Внимание", "Слишком короткое имя");
        const snap = await db.ref('users/' + user).once('value');
        if (snap.exists() && snap.val().password === pass) {
            localStorage.setItem('globalLinkUser', user);
            startApp(user);
        } else showNotification("Ошибка", "Неверный логин или пароль");
    }

    async function register() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value.trim();
        if (user.length < 2) return showNotification("Внимание", "Слишком короткое имя");
        const snap = await db.ref('users/' + user).once('value');
        if (snap.exists()) showNotification("Ошибка", "Имя занято");
        else {
            await db.ref('users/' + user).set({ password: pass });
            localStorage.setItem('globalLinkUser', user);
            startApp(user);
        }
    }

    function startApp(user) {
        myName = user;
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('my-name-display').innerText = user;
        
        trackOnlineStatus();
        listenRequests();
        listenFriends();
        listenGlobalCalls();
        listenForNotifications();
    }

    function trackOnlineStatus() {
        const amOnline = db.ref(`.info/connected`);
        const userRef = db.ref(`online/${myName}`);
        amOnline.on('value', snap => {
            if (snap.val()) {
                userRef.onDisconnect().remove();
                userRef.set(true);
            }
        });
        db.ref('online').on('value', snap => {
            document.getElementById('online-banner').innerText = `Сейчас в сети: ${snap.numChildren()}`;
        });
    }

    function openRequestsModal() { document.getElementById('requests-modal').style.display = 'flex'; }
    function closeRequestsModal() { document.getElementById('requests-modal').style.display = 'none'; }

    async function sendFriendRequest() {
        const target = document.getElementById('search-name').value.trim().toLowerCase();
        if (!target || target === myName) return;
        const snap = await db.ref('users/' + target).once('value');
        if (!snap.exists()) return showNotification("Ошибка", "Пользователь не найден");
        await db.ref(`requests/${target}/${myName}`).set("pending");
        document.getElementById('search-name').value = "";
        showNotification("Успех", "Запрос отправлен!");
    }

    function listenRequests() {
        db.ref(`requests/${myName}`).on('value', snap => {
            const list = document.getElementById('request-list');
            const badge = document.getElementById('req-count');
            list.innerHTML = "";
            let count = 0;
            if(snap.exists()) {
                snap.forEach(child => {
                    if (child.val() === "pending") {
                        count++;
                        list.innerHTML += `<div class="list-item"><span>${child.key}</span> <button onclick="acceptFriend('${child.key}')">Принять</button></div>`;
                    }
                });
            } else { list.innerHTML = "Нет новых запросов"; }
            badge.innerText = count;
            count > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
        });
    }

    async function acceptFriend(friend) {
        await db.ref(`friends/${myName}/${friend}`).set(true);
        await db.ref(`friends/${friend}/${myName}`).set(true);
        await db.ref(`requests/${myName}/${friend}`).remove();
        closeRequestsModal();
    }

    function listenFriends() {
        db.ref(`friends/${myName}`).on('value', snap => {
            const list = document.getElementById('friends-list');
            list.innerHTML = "";
            if(snap.exists()) {
                snap.forEach(child => {
                    list.innerHTML += `<div class="list-item" onclick="openChat('${child.key}')" style="cursor:pointer;"><span style="font-weight: bold;">👤 ${child.key}</span> <span style="color: var(--accent);">Чат ➡</span></div>`;
                });
            }
        });
    }

    function listenForNotifications() {
        db.ref(`friends/${myName}`).once('value', snap => {
            if(!snap.exists()) return;
            snap.forEach(friendSnap => {
                const friend = friendSnap.key;
                const chatId = [myName, friend].sort().join('_');
                db.ref(`chats/${chatId}`).limitToLast(1).on('child_added', msgSnap => {
                    const d = msgSnap.val();
                    if(d.f === friend && activeChat !== friend && Date.now() - d.t < 5000) {
                        let text = d.m;
                        if(d.type === 'audio') text = '🎤 Голосовое сообщение';
                        if(d.type === 'call_log') text = '📞 Звонок';
                        showNotification(friend, text);
                    }
                });
            });
        });
    }

    function showNotification(title, text) {
        const toast = document.getElementById('notification-toast');
        document.getElementById('notif-title').innerText = title;
        document.getElementById('notif-text').innerText = text;
        toast.style.top = '20px';
        setTimeout(() => { toast.style.top = '-100px'; }, 4000);
    }

    function openChat(friend) {
        activeChat = friend;
        document.getElementById('chat-window').classList.remove('hidden');
        document.getElementById('chat-with-name').innerText = friend;
        document.getElementById('messages').innerHTML = "";
        
        const chatId = [myName, friend].sort().join('_');
        db.ref(`chats/${chatId}`).off(); 
        
        db.ref(`chats/${chatId}`).on('child_added', snap => {
            const d = snap.val();
            const msgId = snap.key;
            if(deletedForMe.includes(msgId)) return; // Пропуск удаленных для себя
            
            if(d.f !== myName && d.status !== 'read' && d.type !== 'call_log') {
                db.ref(`chats/${chatId}/${msgId}`).update({ status: 'read' });
            }
            renderMessage(d, msgId);
        });

        db.ref(`chats/${chatId}`).on('child_changed', snap => {
            const d = snap.val();
            const el = document.getElementById(`status-${snap.key}`);
            if(el && d.f === myName) {
                el.innerText = d.status === 'read' ? '✓✓' : '✓';
                if(d.status === 'read') el.style.color = '#38bdf8';
            }
        });

        // Удаление "для всех" в реальном времени
        db.ref(`chats/${chatId}`).on('child_removed', snap => {
            const el = document.getElementById(`msg-${snap.key}`);
            if (el) el.remove();
        });
    }

    function renderMessage(d, msgId) {
        const div = document.createElement('div');
        const timeStr = getMskTimeStr(d.t);
        
        if (d.type === 'call_log') {
            div.className = `msg system-msg`;
            div.id = `msg-${msgId}`;
            div.innerHTML = `${d.m} <br><span style="font-size:9px;">${timeStr}</span>`;
            div.onclick = () => openMsgOptions(msgId, false); // системные (звонки) можно удалить только у себя
        } else {
            div.className = `msg ${d.f === myName ? 'me' : 'them'}`;
            div.id = `msg-${msgId}`;
            div.onclick = () => openMsgOptions(msgId, d.f === myName);
            
            const statusIcon = d.f === myName ? `<span id="status-${msgId}" class="status-checks" style="color: ${d.status==='read'?'#38bdf8':'inherit'}">${d.status==='read'?'✓✓':'✓'}</span>` : '';

            if(d.type === 'audio') {
                div.innerHTML = `<audio controls src="${d.m}"></audio><div class="msg-time">${timeStr} ${statusIcon}</div>`;
            } else {
                div.innerHTML = `<div>${d.m}</div><div class="msg-time">${timeStr} ${statusIcon}</div>`;
            }
        }
        
        document.getElementById('messages').appendChild(div);
        const container = document.getElementById('messages');
        container.scrollTop = container.scrollHeight;
    }

    // --- ЛОГИКА УДАЛЕНИЯ СООБЩЕНИЙ ---
    function openMsgOptions(msgId, isMine) {
        selectedMsgId = msgId;
        const btnAll = document.getElementById('btn-del-everyone');
        if(isMine) {
            btnAll.style.display = 'block';
        } else {
            btnAll.style.display = 'none'; // Чужие сообщения удалять у всех нельзя
        }
        document.getElementById('msg-options').classList.add('active');
    }

    function closeMsgOptions() {
        selectedMsgId = null;
        document.getElementById('msg-options').classList.remove('active');
    }

    function deleteMsgForEveryone() {
        if(!selectedMsgId || !activeChat) return;
        const chatId = [myName, activeChat].sort().join('_');
        db.ref(`chats/${chatId}/${selectedMsgId}`).remove();
        closeMsgOptions();
    }

    function deleteMsgForMe() {
        if(!selectedMsgId) return;
        deletedForMe.push(selectedMsgId);
        localStorage.setItem('deletedMessages', JSON.stringify(deletedForMe));
        const el = document.getElementById(`msg-${selectedMsgId}`);
        if(el) el.remove();
        closeMsgOptions();
    }
    // ----------------------------------

    function closeChat() {
        document.getElementById('chat-window').classList.add('hidden');
        activeChat = "";
    }

    function sendMsg() {
        const txt = document.getElementById('msg-input').value.trim();
        if (!txt || !activeChat) return;
        const chatId = [myName, activeChat].sort().join('_');
        db.ref(`chats/${chatId}`).push({ f: myName, m: txt, t: Date.now(), type: 'text', status: 'sent' });
        document.getElementById('msg-input').value = "";
    }

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    async function toggleVoiceRecord() {
        const btn = document.getElementById('btn-voice');
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const base64Audio = reader.result;
                        const chatId = [myName, activeChat].sort().join('_');
                        db.ref(`chats/${chatId}`).push({ f: myName, m: base64Audio, t: Date.now(), type: 'audio', status: 'sent' });
                    }
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('recording');
            } catch(e) { showNotification("Ошибка", "Нет доступа к микрофону"); }
        } else {
            if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            isRecording = false;
            btn.classList.remove('recording');
        }
    }

    // --- WEBRTC ВИДЕО И АУДИО ЗВОНКИ ---
    async function makeCall(video) {
        if (!activeChat) return;
        isVideoCallActive = video;
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: video });
            if(video) {
                document.getElementById('video-container').classList.remove('hidden');
                document.getElementById('localVideo').srcObject = localStream;
            }
        } catch (err) {
            return showNotification("Ошибка", "Нет доступа к камере/микрофону!");
        }
        
        try {
            await db.ref(`calls/${activeChat}`).remove(); // Очистка старых сессий
            pc = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(tr => pc.addTrack(tr, localStream));
            
            pc.onicecandidate = e => { if (e.candidate) db.ref(`calls/${activeChat}/callerIce`).push(e.candidate.toJSON()); };
            pc.ontrack = e => {
                if(video) document.getElementById('remoteVideo').srcObject = e.streams[0];
                else document.getElementById('remoteAudio').srcObject = e.streams[0];
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await db.ref(`calls/${activeChat}`).update({ offer: { type: offer.type, sdp: offer.sdp }, from: myName, video: video });
            
            toggleCallUI(true);

            db.ref(`calls/${myName}/answer`).on('value', async snap => {
                if (snap.val() && pc.signalingState !== 'stable') await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
            });
            db.ref(`calls/${myName}/calleeIce`).on('child_added', snap => {
                if (snap.val() && pc) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
            db.ref(`calls/${myName}/end`).on('value', snap => { if(snap.exists()) endCall(false); });
        } catch (err) { console.error(err); endCall(true); }
    }

    function listenGlobalCalls() {
        db.ref(`calls/${myName}`).on('value', async snap => {
            const data = snap.val();
            if (data && data.offer && data.from && !pc) {
                pendingCallData = data;
                document.getElementById('caller-name').innerText = data.from;
                document.getElementById('incoming-icon').innerText = data.video ? '📹' : '📞';
                document.getElementById('incoming-type-text').innerText = data.video ? 'Входящий видеозвонок' : 'Входящий звонок';
                document.getElementById('incoming-call-banner').classList.remove('hidden');
            }
        });
    }

    async function acceptIncomingCall() {
        document.getElementById('incoming-call-banner').classList.add('hidden');
        if (!pendingCallData) return;
        const data = pendingCallData;
        isVideoCallActive = data.video;
        if(activeChat !== data.from) openChat(data.from);
        await answerCall(data.from, data.offer, data.video);
        pendingCallData = null;
    }

    function rejectIncomingCall() {
        document.getElementById('incoming-call-banner').classList.add('hidden');
        if (!pendingCallData) return;
        
        // Запись лога о пропущенном звонке
        const chatId = [myName, pendingCallData.from].sort().join('_');
        db.ref(`chats/${chatId}`).push({ f: myName, m: 'Отклоненный вызов', t: Date.now(), type: 'call_log', status: 'sent' });
        
        db.ref(`calls/${pendingCallData.from}/end`).set(true);
        db.ref(`calls/${myName}`).remove();
        pendingCallData = null;
    }

    async function answerCall(callerId, offerDesc, video) {
        try { 
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: video }); 
            if(video) {
                document.getElementById('video-container').classList.remove('hidden');
                document.getElementById('localVideo').srcObject = localStream;
            }
        } catch (err) { 
            db.ref(`calls/${callerId}/end`).set(true); 
            return showNotification("Ошибка", "Нет доступа к медиа!"); 
        }
        
        try {
            pc = new RTCPeerConnection(rtcConfig);
            localStream.getTracks().forEach(tr => pc.addTrack(tr, localStream));
            
            pc.onicecandidate = e => { if (e.candidate) db.ref(`calls/${callerId}/calleeIce`).push(e.candidate.toJSON()); };
            pc.ontrack = e => {
                if(video) document.getElementById('remoteVideo').srcObject = e.streams[0];
                else document.getElementById('remoteAudio').srcObject = e.streams[0];
            };

            await pc.setRemoteDescription(new RTCSessionDescription(offerDesc));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await db.ref(`calls/${callerId}`).update({ answer: { type: answer.type, sdp: answer.sdp } });
            
            toggleCallUI(true);

            db.ref(`calls/${myName}/callerIce`).on('child_added', snap => {
                if (snap.val() && pc) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });
            db.ref(`calls/${myName}/end`).on('value', snap => { if(snap.exists()) endCall(false); });
        } catch (err) { console.error(err); endCall(true); }
    }

    function toggleCallUI(inCall) {
        document.getElementById('btn-make-call-audio').classList.toggle('hidden', inCall);
        document.getElementById('btn-make-call-video').classList.toggle('hidden', inCall);
        document.getElementById('btn-end-call').classList.toggle('hidden', !inCall);
        document.getElementById('call-status').style.display = inCall ? 'block' : 'none';
    }

    function endCall(notify = true) {
        if (pc) {
            // Пишем лог звонка при завершении
            if (activeChat) {
                const chatId = [myName, activeChat].sort().join('_');
                db.ref(`chats/${chatId}`).push({ 
                    f: myName, 
                    m: isVideoCallActive ? '📹 Видеозвонок завершен' : '📞 Звонок завершен', 
                    t: Date.now(), type: 'call_log', status: 'sent' 
                });
            }
            pc.close(); pc = null; 
        }
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        
        document.getElementById('remoteAudio').srcObject = null;
        document.getElementById('remoteVideo').srcObject = null;
        document.getElementById('localVideo').srcObject = null;
        document.getElementById('video-container').classList.add('hidden');
        
        toggleCallUI(false);
        document.getElementById('incoming-call-banner').classList.add('hidden');
        
        if (notify && activeChat) db.ref(`calls/${activeChat}/end`).set(true);
        db.ref(`calls/${myName}`).off(); // Сброс всех слушателей звонка
        db.ref(`calls/${myName}`).remove();
        isVideoCallActive = false;
    }
</script>
